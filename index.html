<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sabina & Raju — Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Jost:wght@100;200;300;400&family=Hind+Siliguri:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#04100a;color:#f5e6c0;font-family:'Cormorant Garamond',serif;overflow-x:hidden;}

:root{
  --forest:#04100a;--em:#0d3320;
  --gold:#c9971a;--gold2:#e8b84b;
  --pale:#f5e6c0;--ivory:#fdf7ec;
}

/* ── REVEAL ANIMATION ── */
.reveal{opacity:0;transform:translateY(36px);transition:opacity .9s ease,transform .9s ease;}
.reveal.on{opacity:1;transform:translateY(0);}

/* ── COVER ── */
.cover{
  min-height:100vh;
  background:radial-gradient(ellipse 90% 70% at 50% 35%,#0d3320 0%,#071a10 55%,#04100a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px 28px 60px;position:relative;overflow:hidden;
}
.cv-lattice{
  position:absolute;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,rgba(201,151,26,.016) 0,rgba(201,151,26,.016) 1px,transparent 1px,transparent 40px),
    repeating-linear-gradient(90deg,rgba(201,151,26,.016) 0,rgba(201,151,26,.016) 1px,transparent 1px,transparent 40px);
}
.cv-glow{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 45% at 50% 38%,rgba(201,151,26,.07) 0%,transparent 65%);
  animation:glowP 7s ease-in-out infinite;
}
@keyframes glowP{0%,100%{opacity:.6}50%{opacity:1}}
.cv-brd{
  position:absolute;top:18px;left:18px;right:18px;bottom:18px;
  border:1px solid rgba(201,151,26,.22);pointer-events:none;
  animation:brdIn 2s ease forwards;opacity:0;
}
.cv-brd::before{content:'';position:absolute;top:9px;left:9px;right:9px;bottom:9px;border:1px solid rgba(201,151,26,.09);}
@keyframes brdIn{to{opacity:1}}
.corn{position:absolute;z-index:2;width:34px;height:34px;opacity:0;animation:cornIn .8s ease forwards;}
.corn.tl{top:16px;left:16px;animation-delay:.5s;}
.corn.tr{top:16px;right:16px;animation-delay:.7s;transform:scaleX(-1);}
.corn.bl{bottom:16px;left:16px;animation-delay:.9s;transform:scaleY(-1);}
.corn.br{bottom:16px;right:16px;animation-delay:1.1s;transform:scale(-1,-1);}
@keyframes cornIn{from{opacity:0}to{opacity:.65}}

/* BISMILLAH */
.bism{font-family:'Scheherazade New',serif;font-size:clamp(22px,5.5vw,32px);color:var(--gold2);direction:rtl;line-height:1.5;animation:riseIn 1.2s ease .2s both;}
.bism-en{font-family:'Jost',sans-serif;font-weight:100;font-size:8px;letter-spacing:.28em;color:rgba(201,151,26,.38);text-transform:uppercase;margin-top:3px;margin-bottom:30px;animation:riseIn 1.2s ease .4s both;}

/* SEAL */
.seal{position:relative;width:148px;height:148px;margin:0 auto 26px;animation:riseIn 1.4s ease .65s both;}
.sr1{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(201,151,26,.28);animation:rot 30s linear infinite;}
.sr2{position:absolute;inset:10px;border-radius:50%;border:1px dashed rgba(201,151,26,.16);animation:rot 20s linear infinite reverse;}
.sr3{position:absolute;inset:20px;border-radius:50%;border:1px solid rgba(201,151,26,.1);animation:rot 45s linear infinite;}
.score{
  position:absolute;inset:28px;border-radius:50%;
  background:radial-gradient(circle at 42% 38%,rgba(13,51,32,.96),rgba(4,16,10,.99));
  border:1.5px solid rgba(201,151,26,.55);
  display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;
}
.score::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(130deg,transparent 35%,rgba(240,200,100,.18) 50%,transparent 65%);
  animation:shimmer 5s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{opacity:0;transform:rotate(-20deg)}45%,55%{opacity:1;transform:rotate(25deg)}}
.seal-rs{font-family:'Cinzel Decorative',serif;font-size:24px;font-weight:700;color:var(--gold2);letter-spacing:.08em;line-height:1;text-shadow:0 0 22px rgba(201,151,26,.5);}
.seal-dot{color:var(--gold);font-size:11px;opacity:.6;margin:2px 0;}
.seal-yr{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.22em;color:rgba(201,151,26,.5);}
.seal-top{position:absolute;top:5px;left:50%;transform:translateX(-50%);font-family:'Jost',sans-serif;font-weight:100;font-size:6px;letter-spacing:.2em;color:rgba(201,151,26,.35);white-space:nowrap;text-transform:uppercase;}
@keyframes rot{to{transform:rotate(360deg)}}

/* NAMES */
.cv-label{font-family:'Jost',sans-serif;font-weight:100;font-size:8.5px;letter-spacing:.35em;color:rgba(201,151,26,.4);text-transform:uppercase;margin-bottom:10px;animation:riseIn 1s ease 1s both;}
.cv-host{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:rgba(201,151,26,.45);margin-bottom:10px;animation:riseIn 1s ease 1.1s both;}
.cv-groom{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,9vw,60px);font-weight:300;color:var(--ivory);line-height:1;letter-spacing:.04em;animation:riseIn 1s ease 1.15s both;}
.cv-amp{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,40px);color:var(--gold);font-style:italic;font-weight:300;display:block;margin:5px 0;animation:riseIn 1s ease 1.25s both;}
.cv-bride{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,8.5vw,58px);font-weight:600;color:var(--ivory);line-height:1;letter-spacing:.04em;margin-bottom:26px;animation:riseIn 1s ease 1.35s both;}
.cv-date{border-top:1px solid rgba(201,151,26,.22);border-bottom:1px solid rgba(201,151,26,.22);padding:16px 28px;max-width:320px;width:100%;text-align:center;animation:riseIn 1s ease 1.5s both;}
.cv-date-main{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--gold2);text-transform:uppercase;}
.cv-date-ven{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(201,151,26,.45);margin-top:4px;}
.cv-scroll{margin-top:24px;font-family:'Jost',sans-serif;font-weight:100;font-size:8px;letter-spacing:.28em;color:rgba(201,151,26,.28);text-transform:uppercase;animation:riseIn 1s ease 1.8s both,blnk 3s ease 2s infinite;}
@keyframes blnk{0%,100%{opacity:.25}50%{opacity:.65}}
@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION BASE ── */
section{padding:70px 24px;max-width:500px;margin:0 auto;text-align:center;}
.s-divider{display:flex;align-items:center;gap:12px;max-width:280px;margin:0 auto 32px;}
.s-div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,151,26,.35),transparent);}
.s-div-gem{color:var(--gold);font-size:13px;opacity:.6;}
.s-ar{font-family:'Scheherazade New',serif;font-size:clamp(18px,4vw,26px);color:var(--gold2);direction:rtl;margin-bottom:8px;opacity:.85;}
.eyebrow{font-family:'Jost',sans-serif;font-weight:100;font-size:8px;letter-spacing:.32em;color:rgba(201,151,26,.5);text-transform:uppercase;margin-bottom:10px;}
.s-title{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,7vw,46px);font-weight:300;color:var(--ivory);line-height:1.1;letter-spacing:.03em;margin-bottom:6px;}
.s-bn{font-family:'Hind Siliguri',sans-serif;font-size:13px;color:rgba(201,151,26,.42);font-weight:300;}

/* section backgrounds */
.sec-dark{background:linear-gradient(160deg,#071a10 0%,#04100a 55%,#060f07 100%);}
.sec-mid{background:linear-gradient(155deg,#071a10 0%,#04100a 100%);}

/* ── INVITE TEXT ── */
.ibox{background:rgba(13,51,32,.3);border:1px solid rgba(201,151,26,.18);padding:22px 20px;max-width:400px;width:100%;text-align:center;margin:16px auto 0;}
.ibox-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:rgba(245,230,192,.7);line-height:1.8;}
.ibox-bold{color:var(--ivory);font-weight:600;font-style:normal;}
.ibox-bn{font-family:'Hind Siliguri',sans-serif;font-size:13px;color:rgba(245,230,192,.55);line-height:1.8;font-weight:300;margin-bottom:8px;}
.ibox-divider{height:1px;background:rgba(201,151,26,.15);margin:14px 0;}
.ibox-parents{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.ibox-p{font-family:'Cormorant Garamond',serif;font-size:12px;color:rgba(201,151,26,.5);font-style:italic;}

/* ── PHOTO HERO ── */
.photo-section{padding:0;max-width:100%;overflow:hidden;position:relative;}
.photo-hero{width:100%;max-height:60vh;object-fit:cover;object-position:center top;display:block;filter:brightness(.82) saturate(1.1);}
.photo-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(4,16,10,.3) 0%,transparent 30%,transparent 60%,rgba(4,16,10,.7) 100%);
  pointer-events:none;
}
.photo-caption{padding:28px 24px 48px;text-align:center;background:#04100a;}
.photo-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,5vw,30px);font-weight:300;color:var(--ivory);line-height:1.4;}
.photo-bn{font-family:'Hind Siliguri',sans-serif;font-size:12px;color:rgba(201,151,26,.4);margin-top:6px;}
.qr-ar{font-family:'Scheherazade New',serif;font-size:17px;color:rgba(201,151,26,.55);direction:rtl;margin-top:10px;}
.qr-en{font-family:'Jost',sans-serif;font-weight:200;font-size:9px;letter-spacing:.1em;color:rgba(201,151,26,.3);margin-top:3px;}

/* ── EVENTS ── */
.ev-stack{display:flex;flex-direction:column;gap:14px;max-width:420px;width:100%;margin:18px auto 0;text-align:left;}
.ev-card{border:1px solid rgba(201,151,26,.2);background:rgba(201,151,26,.03);padding:18px 18px 18px 22px;position:relative;}
.ev-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);opacity:.65;}
.ev-badge{font-family:'Jost',sans-serif;font-weight:200;font-size:8px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:5px;}
.ev-name{font-family:'Cinzel',serif;font-size:16px;color:var(--pale);letter-spacing:.06em;margin-bottom:2px;}
.ev-name-bn{font-family:'Hind Siliguri',sans-serif;font-size:11px;color:rgba(201,151,26,.38);margin-bottom:6px;font-weight:300;}
.ev-detail{font-family:'Jost',sans-serif;font-weight:300;font-size:11.5px;color:rgba(201,151,26,.42);letter-spacing:.04em;line-height:1.75;}

/* ── GALLERY ── */
.gallery-section{background:#04100a;padding:60px 0 0;}
.gallery-header{text-align:center;padding:0 24px 28px;}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:100%;}
.gimg{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center top;display:block;filter:brightness(.82) saturate(1.05);transition:filter .4s;}
.gimg:active{filter:brightness(.95);}
.gimg.wide{grid-column:span 2;aspect-ratio:16/9;object-position:center 25%;}

/* ── COUNTDOWN ── */
.cd-row{display:flex;justify-content:center;gap:0;margin:24px auto 0;max-width:320px;}
.cd-box{display:flex;flex-direction:column;align-items:center;border:1px solid rgba(201,151,26,.18);background:rgba(201,151,26,.04);padding:14px 16px;min-width:68px;flex:1;}
.cd-box+.cd-box{border-left:none;}
.cd-num{font-family:'Cinzel',serif;font-size:clamp(28px,7vw,40px);color:var(--gold2);line-height:1;}
.cd-lbl{font-family:'Jost',sans-serif;font-weight:100;font-size:7px;letter-spacing:.2em;color:rgba(201,151,26,.4);text-transform:uppercase;margin-top:4px;}

/* VENUE CARD */
.venue-card{background:rgba(13,51,32,.25);border:1px solid rgba(201,151,26,.16);padding:20px;max-width:340px;width:100%;margin:20px auto 0;text-align:center;}
.venue-name{font-family:'Cinzel',serif;font-size:17px;color:var(--pale);letter-spacing:.08em;margin-bottom:6px;}
.venue-addr{font-family:'Jost',sans-serif;font-weight:300;font-size:12px;color:rgba(201,151,26,.42);letter-spacing:.04em;line-height:1.8;}
.map-btn{display:inline-block;margin-top:16px;border:1px solid rgba(201,151,26,.4);color:var(--gold);font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.2em;padding:11px 24px;text-decoration:none;transition:all .3s;background:transparent;}
.cal-btn{display:block;margin:14px auto 0;border:1px solid rgba(201,151,26,.22);color:rgba(201,151,26,.5);font-family:'Cinzel',serif;font-size:8px;letter-spacing:.18em;padding:11px 20px;background:transparent;cursor:pointer;transition:all .3s;max-width:260px;width:100%;}
.cal-btn:hover{color:var(--gold);border-color:rgba(201,151,26,.45);}

/* ── RSVP FORM ── */
.form-wrap{max-width:400px;width:100%;margin:0 auto;text-align:left;}
.f-note{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:rgba(201,151,26,.48);text-align:center;margin-bottom:6px;line-height:1.6;}
.f-note-bn{font-family:'Hind Siliguri',sans-serif;font-size:11px;color:rgba(201,151,26,.32);text-align:center;margin-bottom:18px;font-weight:300;}
.ff{margin-bottom:12px;}
.fl{font-family:'Jost',sans-serif;font-weight:200;font-size:8px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:5px;}
.fi,.fsel,.fta{width:100%;background:rgba(255,247,230,.03);border:1px solid rgba(201,151,26,.2);color:var(--ivory);font-family:'Cormorant Garamond',serif;font-size:15px;padding:11px 13px;outline:none;border-radius:0;-webkit-appearance:none;transition:border-color .3s;}
.fi::placeholder,.fta::placeholder{color:rgba(201,151,26,.22);}
.fi:focus,.fsel:focus,.fta:focus{border-color:rgba(201,151,26,.5);}
.fsel option{background:#071a10;color:var(--ivory);}
.fta{resize:none;height:72px;}
.tog-row{display:flex;gap:8px;flex-wrap:wrap;}
.tog{flex:1;min-width:72px;border:1px solid rgba(201,151,26,.18);padding:10px 6px;text-align:center;cursor:pointer;font-family:'Jost',sans-serif;font-weight:300;font-size:11px;color:rgba(201,151,26,.42);letter-spacing:.05em;transition:all .2s;user-select:none;}
.tog.on{background:rgba(201,151,26,.1);border-color:var(--gold);color:var(--pale);}
.wa-btn{width:100%;background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.35);color:#6ed98e;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.22em;padding:14px;cursor:pointer;margin-top:12px;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px;}
.sub-btn{width:100%;background:transparent;border:1px solid rgba(201,151,26,.4);color:var(--gold);font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.25em;padding:14px;cursor:pointer;margin-top:10px;transition:all .3s;}
.sub-btn:hover{background:rgba(201,151,26,.09);color:var(--gold2);}
.suc-box{display:none;background:rgba(201,151,26,.06);border:1px solid rgba(201,151,26,.22);padding:16px;text-align:center;margin-top:12px;}
.suc-box.show{display:block;}
.suc-box p{font-family:'Scheherazade New',serif;font-size:18px;color:var(--pale);}

/* ── GUESTBOOK ── */
.gb-list{max-width:420px;width:100%;margin:18px auto 0;display:flex;flex-direction:column;gap:10px;}
.gb-entry{background:rgba(201,151,26,.04);border:1px solid rgba(201,151,26,.13);padding:14px;text-align:left;}
.gb-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold2);letter-spacing:.08em;margin-bottom:4px;}
.gb-msg{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(245,230,192,.6);line-height:1.5;}
.gb-row{display:flex;flex-wrap:wrap;gap:8px;max-width:420px;width:100%;margin:14px auto 0;}
.gb-in{flex:1;min-width:120px;background:rgba(255,247,230,.03);border:1px solid rgba(201,151,26,.2);color:var(--ivory);font-family:'Cormorant Garamond',serif;font-size:15px;padding:11px 13px;outline:none;border-radius:0;}
.gb-in::placeholder{color:rgba(201,151,26,.22);}
.gb-in:focus{border-color:rgba(201,151,26,.45);}
.gb-btn{background:transparent;border:1px solid rgba(201,151,26,.35);color:var(--gold);font-family:'Cinzel',serif;font-size:8px;letter-spacing:.18em;padding:11px 18px;cursor:pointer;white-space:nowrap;transition:all .3s;}

/* ── CLOSING ── */
.closing-section{
  background:radial-gradient(ellipse 90% 70% at 50% 50%,#0d3320 0%,#071a10 55%,#04100a 100%);
  padding:80px 24px 100px;text-align:center;
}
.closing-ar{font-family:'Scheherazade New',serif;font-size:clamp(24px,5.5vw,34px);color:var(--gold);direction:rtl;margin-bottom:10px;}
.closing-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(201,151,26,.42);margin-bottom:8px;line-height:1.75;max-width:300px;margin-left:auto;margin-right:auto;}
.closing-bn{font-family:'Hind Siliguri',sans-serif;font-size:12px;color:rgba(201,151,26,.3);margin-bottom:26px;font-weight:300;}
.closing-names{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,38px);font-weight:300;color:var(--ivory);letter-spacing:.04em;}
.closing-sub{font-family:'Jost',sans-serif;font-weight:100;font-size:9px;letter-spacing:.2em;color:rgba(201,151,26,.3);text-transform:uppercase;margin-top:8px;}
.closing-love{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:rgba(201,151,26,.25);margin-top:20px;}

/* section separator */
.sep{display:flex;align-items:center;gap:14px;padding:0 28px;max-width:500px;margin:0 auto;}
.sep-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,151,26,.25),transparent);}
.sep-g{color:var(--gold);font-size:14px;opacity:.5;}

/* ── LUXURY COVER OVERRIDES ── */
.cover {
  min-height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0;
  overflow: hidden;
  background: #020904;
}
